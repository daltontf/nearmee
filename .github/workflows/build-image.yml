name: Build and Export Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch: # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image 
        run: |
          docker build -t nearmee:latest .

      # - name: Save Docker images as tars
      #   run: |
      #     mkdir -p artifacts
      #     docker save nearme-server:latest -o artifacts/nearmee-server.tar
      #     docker save nearme-client:latest -o artifacts/nearmee-client.tar

      # - name: Upload tar artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: docker-nearme-server.tar
      #     path: artifacts/nearme-server.tar

      # - name: Upload tar artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: docker-nearme-client.tar
      #     path: artifacts/nearmee-client.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag and push images
        run: |
          docker tag nearmee:latest daltontf1212/nearmee:latest
          docker push daltontf1212/nearmee:latest
