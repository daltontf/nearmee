services:
  server:
    image: daltontf1212/nearmee-server:latest
    ports:
      - "3001:3001"
    environment:
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY}
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - mongodb
 
  mongodb:
    image: mongodb/mongodb-community-server:latest
    ports:
      - "27017:27017"

volumes:
  mongodb_data: